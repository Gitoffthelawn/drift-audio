<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift // Sound Lab v3</title>
<style>
  :root {
    --bg: #0a0d0f;
    --panel: #11161a;
    --panel-border: #1e2930;
    --chrome-dim: #2a3540;
    --text: #c8d0c8;
    --text-mid: #8a9088;
    --text-dim: #5e6b63;
    --text-faint: #3e4a43;
    --amber: #d4a056;
    --amber-bg: #1f1811;
    --amber-border: #3d2e15;
    --green: #5dd06b;
    --green-bg: #0f1e15;
    --green-border: #2a4438;
    --red: #d6665a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 20px;
    padding-bottom: 110px;
  }
  header {
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 14px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .brand {
    color: var(--amber);
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .brand .slash { color: var(--text-dim); margin: 0 6px; }
  .brand .ver { color: var(--text-dim); font-size: 10px; margin-left: 10px; }
  .status {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .lab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 16px 18px;
    transition: border-color 0.15s;
    position: relative;
  }
  .card.active { border-color: var(--green-border); }
  .card.flagship { border-color: var(--amber-border); }
  .card.flagship.active { border-color: var(--amber); }
  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--chrome-dim);
    background: #0d1511;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card.active .icon { border-color: var(--green-border); }
  .card.flagship.active .icon { border-color: var(--amber); }
  .name {
    flex: 1;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge.syn    { background: var(--amber-bg); color: var(--amber); }
  .badge.hp     { background: var(--amber-bg); color: var(--amber); }
  .badge.flag   { background: #2d1f0a; color: #ffcb6b; border: 1px solid var(--amber-border); }
  .play-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--chrome-dim);
    color: var(--text-mid);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .card.active .play-btn {
    color: var(--green);
    border-color: var(--green-border);
    background: var(--green-bg);
  }
  .card.flagship.active .play-btn {
    color: var(--amber);
    border-color: var(--amber);
    background: var(--amber-bg);
  }
  .desc {
    color: var(--text-dim);
    font-size: 11px;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .meter-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .meter-label {
    color: var(--text-faint);
    font-size: 8px;
    letter-spacing: 0.2em;
  }
  canvas.meter {
    flex: 1;
    height: 10px;
    background: #080b0d;
    border-radius: 2px;
    border: 1px solid var(--panel-border);
  }
  .param {
    display: grid;
    grid-template-columns: 78px 1fr 60px;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .param-label {
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .param-value {
    color: var(--text-mid);
    font-size: 11px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: #1a2128;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--chrome-dim);
    border-radius: 4px;
    padding: 4px 6px;
    font-family: inherit;
    font-size: 11px;
    width: 100%;
    cursor: pointer;
  }
  .footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--panel-border);
    padding: 12px 20px;
    display: flex;
    gap: 14px;
    align-items: center;
    z-index: 10;
    flex-wrap: wrap;
  }
  .footer-label {
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .master-vol {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 180px;
    max-width: 260px;
  }
  .master-vol input { flex: 1; }
  .preset-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 280px;
  }
  .preset-row select { flex: 1; min-width: 120px; }
  .action-btn {
    background: transparent;
    color: var(--amber);
    border: 1px solid var(--amber-border);
    padding: 7px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
  }
  .action-btn:hover { background: var(--amber-bg); }
  .action-btn.small { padding: 5px 9px; font-size: 9px; }
  .action-btn.danger { color: var(--red); border-color: #4a2420; }
  .action-btn.danger:hover { background: #1f1411; }
  dialog {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 20px;
    max-width: 640px;
    width: 90%;
    font-family: inherit;
  }
  dialog::backdrop { background: rgba(0,0,0,0.7); }
  dialog h2 {
    color: var(--amber);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 500;
  }
  textarea, input.text-input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--chrome-dim);
    border-radius: 4px;
    padding: 10px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
  }
  textarea { height: 280px; resize: vertical; }
  input.text-input { padding: 8px 10px; margin-bottom: 10px; }
  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 14px;
  }
  .warning-banner {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    color: var(--amber);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 6px 10px;
    border-radius: 3px;
    margin-bottom: 10px;
  }
  .output-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0 14px;
    border-bottom: 1px solid var(--panel-border);
    margin-bottom: 20px;
  }
  .output-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; flex-shrink: 0; }
  .output-pills { display: flex; gap: 6px; }
  .output-pill {
    padding: 5px 14px;
    border: 1px solid var(--chrome-dim);
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .output-pill.active { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .output-pill:active { opacity: 0.7; }
  .mode-note { font-size: 9px; color: var(--text-faint); letter-spacing: 0.05em; }
</style>
</head>
<body>

<header>
  <div class="brand">
    Drift <span class="slash">//</span> Sound Lab <span class="ver">v3</span>
  </div>
  <div class="status" id="status">READY</div>
</header>

<div class="output-bar">
  <span class="output-label">Output</span>
  <div class="output-pills">
    <button class="output-pill" data-mode="speaker" onclick="setOutputMode('speaker')">SPEAKER</button>
    <button class="output-pill" data-mode="stereo" onclick="setOutputMode('stereo')">STEREO</button>
    <button class="output-pill" data-mode="headphones" onclick="setOutputMode('headphones')">PHONES</button>
  </div>
  <span class="mode-note" id="mode-note"></span>
</div>

<div class="lab-grid" id="grid"></div>

<div class="footer">
  <div class="master-vol">
    <span class="footer-label">Master</span>
    <input type="range" id="master" min="0" max="100" value="70" step="1">
    <span id="master-val" class="param-value">70</span>
  </div>
  <div class="preset-row">
    <span class="footer-label">Preset</span>
    <select id="preset-select"></select>
    <button class="action-btn small" id="preset-load">Load</button>
    <button class="action-btn small" id="preset-save">Save</button>
    <button class="action-btn small danger" id="preset-del">Del</button>
  </div>
  <button class="action-btn small" id="export-btn">Export (JSON)</button>
  <button class="action-btn small" id="export-appjs-btn">Export (app.js)</button>
  <button class="action-btn small" id="import-btn">Import</button>
  <button class="action-btn small" id="reset-btn">Reset</button>
  <button class="action-btn danger" id="stop-all">Stop All</button>
</div>

<dialog id="export-dialog">
  <h2>Current Patch Settings</h2>
  <textarea id="export-text" readonly></textarea>
  <div class="dialog-actions">
    <button class="action-btn" id="copy-btn">Copy</button>
    <button class="action-btn" id="download-btn">Download .js</button>
    <button class="action-btn" onclick="document.getElementById('export-dialog').close()">Close</button>
  </div>
</dialog>

<dialog id="import-dialog">
  <h2>Paste JSON to Restore</h2>
  <textarea id="import-text" placeholder='{"ocean": {...}, ...}'></textarea>
  <div class="dialog-actions">
    <button class="action-btn" id="apply-import">Apply</button>
    <button class="action-btn" onclick="document.getElementById('import-dialog').close()">Cancel</button>
  </div>
</dialog>

<dialog id="save-preset-dialog">
  <h2>Save Preset</h2>
  <input class="text-input" id="preset-name" placeholder="e.g. Warp Cruise, Hull Storm...">
  <div class="dialog-actions">
    <button class="action-btn" id="preset-save-confirm">Save</button>
    <button class="action-btn" onclick="document.getElementById('save-preset-dialog').close()">Cancel</button>
  </div>
</dialog>

<script>
try {
// ============================================================================
// AUDIO SETUP
// ============================================================================
const AC = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AC();
const masterGain = audioCtx.createGain();
masterGain.gain.value = 0.7;

// ── Output Mode ──────────────────────────────────────────────────
let _outputMode = localStorage.getItem('drift_sl_output_mode') || 'speaker';
let _modeNodes = [];
function buildSLMasterChain() {
  masterGain.disconnect();
  _modeNodes.forEach(n => { try { n.disconnect(); } catch(_e) {} });
  _modeNodes = [];
  if (_outputMode === 'speaker') {
    const splitter = audioCtx.createChannelSplitter(2);
    const merger = audioCtx.createChannelMerger(1);
    const hiShelf = audioCtx.createBiquadFilter();
    hiShelf.type = 'highshelf'; hiShelf.frequency.value = 8000; hiShelf.gain.value = -4;
    const bassBoost = audioCtx.createBiquadFilter();
    bassBoost.type = 'peaking'; bassBoost.frequency.value = 180; bassBoost.Q.value = 1.2; bassBoost.gain.value = 2.5;
    const limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.value = -3; limiter.ratio.value = 20; limiter.attack.value = 0.001; limiter.release.value = 0.1;
    masterGain.connect(splitter);
    splitter.connect(merger, 0, 0); splitter.connect(merger, 1, 0);
    merger.connect(hiShelf); hiShelf.connect(bassBoost); bassBoost.connect(limiter); limiter.connect(audioCtx.destination);
    _modeNodes = [splitter, merger, hiShelf, bassBoost, limiter];
  } else {
    masterGain.connect(audioCtx.destination);
  }
}
function setOutputMode(mode) {
  _outputMode = mode;
  localStorage.setItem('drift_sl_output_mode', mode);
  document.querySelectorAll('.output-pill').forEach(p => p.classList.toggle('active', p.dataset.mode === mode));
  const notes = { speaker: 'mono + phone EQ + limiter', stereo: 'passthrough', headphones: 'passthrough (binaural in v2)' };
  const noteEl = document.getElementById('mode-note');
  if (noteEl) noteEl.textContent = notes[mode] || '';
  buildSLMasterChain();
}
buildSLMasterChain();
(function initOutputPills() {
  document.querySelectorAll('.output-pill').forEach(p => p.classList.toggle('active', p.dataset.mode === _outputMode));
  const noteEl = document.getElementById('mode-note');
  if (noteEl) { const notes = { speaker: 'mono + phone EQ + limiter', stereo: 'passthrough', headphones: 'passthrough (binaural in v2)' }; noteEl.textContent = notes[_outputMode] || ''; }
})();

function ensureRunning() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function makeNoiseBuffer(type, durationSec) {
  durationSec = durationSec || 2;
  const len = durationSec * audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + w * 0.0555179;
      b1 = 0.99332 * b1 + w * 0.0750759;
      b2 = 0.96900 * b2 + w * 0.1538520;
      b3 = 0.86650 * b3 + w * 0.3104856;
      b4 = 0.55000 * b4 + w * 0.5329522;
      b5 = -0.7616 * b5 - w * 0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      last = (last + 0.02 * w) / 1.02;
      d[i] = last * 3.5;
    }
  }
  return buf;
}

// Shared chain: bus -> fade -> analyser -> vol -> masterGain
function createPatchChain(p) {
  const bus = audioCtx.createGain();  bus.gain.value = 1;
  const fade = audioCtx.createGain(); fade.gain.value = 0;
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  const vol = audioCtx.createGain();  vol.gain.value = p.volume.value;
  bus.connect(fade);
  fade.connect(analyser);
  analyser.connect(vol);
  vol.connect(masterGain);
  return {
    bus, fade, analyser, vol,
    fadeIn(sec) {
      sec = sec || 1;
      const t = audioCtx.currentTime;
      fade.gain.cancelScheduledValues(t);
      fade.gain.setValueAtTime(0, t);
      fade.gain.linearRampToValueAtTime(1, t + sec);
    },
    fadeOut(sec) {
      sec = sec || 0.8;
      const t = audioCtx.currentTime;
      fade.gain.cancelScheduledValues(t);
      fade.gain.linearRampToValueAtTime(0, t + sec);
    },
    setVolume(v) {
      vol.gain.linearRampToValueAtTime(v, audioCtx.currentTime + 0.05);
    },
  };
}

// ============================================================================
// PATCHES
// ============================================================================
const PATCHES = {};

PATCHES.ocean = {
  label: 'Ocean', icon: '~', flagship: false,
  description: 'Brown-noise wave bodies with LFO swells and foam bursts.',
  params: {
    waveRate:   { label: 'Rate',   min: 0.05, max: 0.5,  step: 0.01, value: 0.15, unit: 'Hz' },
    waveDepth:  { label: 'Depth',  min: 0,    max: 1,    step: 0.01, value: 0.7  },
    brightness: { label: 'Bright', min: 300,  max: 3000, step: 10,   value: 900,  unit: 'Hz' },
    foamAmount: { label: 'Foam',   min: 0,    max: 1,    step: 0.01, value: 0.3  },
    volume:     { label: 'Volume', min: 0,    max: 1,    step: 0.01, value: 0.6  },
  },
  factory(p) {
    const c = createPatchChain(p);
    const body = audioCtx.createBufferSource();
    body.buffer = makeNoiseBuffer('brown'); body.loop = true;
    const bodyFilter = audioCtx.createBiquadFilter();
    bodyFilter.type = 'lowpass'; bodyFilter.frequency.value = p.brightness.value;
    const bodyGain = audioCtx.createGain(); bodyGain.gain.value = 0.5;
    body.connect(bodyFilter).connect(bodyGain).connect(c.bus);
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = p.waveRate.value;
    const lfoDepth = audioCtx.createGain();
    lfoDepth.gain.value = p.waveDepth.value * 0.5;
    lfo.connect(lfoDepth).connect(bodyGain.gain);
    let foamTimer;
    function scheduleFoam() {
      if (p.foamAmount.value < 0.05) return;
      const delay = 500 + Math.random() * 3000 * (1 - p.foamAmount.value);
      foamTimer = setTimeout(() => {
        const foam = audioCtx.createBufferSource();
        foam.buffer = makeNoiseBuffer('white', 1);
        const ff = audioCtx.createBiquadFilter();
        ff.type = 'bandpass'; ff.frequency.value = 3000; ff.Q.value = 2;
        const fg = audioCtx.createGain(); fg.gain.value = 0;
        const now = audioCtx.currentTime;
        fg.gain.setValueAtTime(0, now);
        fg.gain.linearRampToValueAtTime(p.foamAmount.value * 0.3, now + 0.1);
        fg.gain.exponentialRampToValueAtTime(0.001, now + 0.5 + Math.random() * 0.8);
        foam.connect(ff).connect(fg).connect(c.bus);
        foam.start(now); foam.stop(now + 1.5);
        scheduleFoam();
      }, delay);
    }
    return {
      analyser: c.analyser,
      start() { body.start(); lfo.start(); c.fadeIn(1); scheduleFoam(); },
      stop() {
        clearTimeout(foamTimer);
        c.fadeOut(0.5);
        setTimeout(() => { try { body.stop(); lfo.stop(); } catch(_) {} }, 600);
      },
      update(params) {
        const t = audioCtx.currentTime;
        bodyFilter.frequency.linearRampToValueAtTime(params.brightness.value, t + 0.1);
        lfo.frequency.linearRampToValueAtTime(params.waveRate.value, t + 0.1);
        lfoDepth.gain.linearRampToValueAtTime(params.waveDepth.value * 0.5, t + 0.1);
        c.setVolume(params.volume.value);
      },
    };
  },
};

PATCHES.birds = {
  label: 'Birds', icon: '>', flagship: false,
  description: 'Formant-synthesised chirps with a feedback-delay reverb.',
  params: {
    chirpRate:  { label: 'Rate',   min: 0.1, max: 3,    step: 0.1,  value: 0.8, unit: '/s' },
    pitchBase:  { label: 'Pitch',  min: 1500, max: 5000, step: 50,  value: 2800, unit: 'Hz' },
    pitchRange: { label: 'Range',  min: 100, max: 2500, step: 50,   value: 800, unit: 'Hz' },
    reverbMix:  { label: 'Reverb', min: 0,   max: 1,    step: 0.01, value: 0.4 },
    volume:     { label: 'Volume', min: 0,   max: 1,    step: 0.01, value: 0.5 },
  },
  factory(p) {
    const c = createPatchChain(p);
    const wet = audioCtx.createGain(); wet.gain.value = p.reverbMix.value;
    const delay = audioCtx.createDelay(2); delay.delayTime.value = 0.18;
    const fb = audioCtx.createGain(); fb.gain.value = 0.5;
    const dFilter = audioCtx.createBiquadFilter();
    dFilter.type = 'lowpass'; dFilter.frequency.value = 4000;
    delay.connect(dFilter).connect(fb).connect(delay);
    delay.connect(wet).connect(c.bus);
    let timer;
    function chirp() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      const startHz = p.pitchBase.value + (Math.random() - 0.5) * p.pitchRange.value;
      const endHz = startHz + (Math.random() - 0.3) * 800;
      osc.frequency.setValueAtTime(startHz, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(200, endHz), now + 0.12);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.15, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(g);
      g.connect(c.bus); g.connect(delay);
      osc.start(now); osc.stop(now + 0.15);
      const nextDelay = (1000 / p.chirpRate.value) * (0.5 + Math.random());
      timer = setTimeout(chirp, nextDelay);
    }
    return {
      analyser: c.analyser,
      start() { c.fadeIn(0.5); chirp(); },
      stop() { clearTimeout(timer); c.fadeOut(0.5); },
      update(params) {
        wet.gain.linearRampToValueAtTime(params.reverbMix.value, audioCtx.currentTime + 0.1);
        c.setVolume(params.volume.value);
      },
    };
  },
};

PATCHES.crickets = {
  label: 'Crickets', icon: '*', flagship: false,
  description: 'Detuned AM stridulation pairs in burst/silence cycles.',
  params: {
    basePitch:  { label: 'Pitch',  min: 2500, max: 5500, step: 50,   value: 4200, unit: 'Hz' },
    detune:     { label: 'Detune', min: 0,    max: 60,   step: 1,    value: 15,   unit: 'ct' },
    burstLen:   { label: 'Burst',  min: 0.1,  max: 3,    step: 0.1,  value: 0.8,  unit: 's' },
    silenceLen: { label: 'Gap',    min: 0.1,  max: 4,    step: 0.1,  value: 0.5,  unit: 's' },
    volume:     { label: 'Volume', min: 0,    max: 1,    step: 0.01, value: 0.4 },
  },
  factory(p) {
    const c = createPatchChain(p);
    const osc1 = audioCtx.createOscillator(); osc1.type = 'triangle';
    const osc2 = audioCtx.createOscillator(); osc2.type = 'triangle';
    const am = audioCtx.createOscillator(); am.type = 'sine'; am.frequency.value = 35;
    const amDepth = audioCtx.createGain(); amDepth.gain.value = 0.5;
    am.connect(amDepth);
    const g1 = audioCtx.createGain(); g1.gain.value = 0;
    const g2 = audioCtx.createGain(); g2.gain.value = 0;
    amDepth.connect(g1.gain);
    amDepth.connect(g2.gain);
    osc1.connect(g1).connect(c.bus);
    osc2.connect(g2).connect(c.bus);
    function setPitch() {
      const base = p.basePitch.value;
      const detRatio = Math.pow(2, p.detune.value / 1200);
      osc1.frequency.linearRampToValueAtTime(base, audioCtx.currentTime + 0.05);
      osc2.frequency.linearRampToValueAtTime(base * detRatio, audioCtx.currentTime + 0.05);
    }
    setPitch();
    let cycleTimer;
    function cycle() {
      const now = audioCtx.currentTime;
      g1.gain.cancelScheduledValues(now);
      g2.gain.cancelScheduledValues(now);
      g1.gain.setValueAtTime(0.08, now);
      g2.gain.setValueAtTime(0.08, now);
      g1.gain.linearRampToValueAtTime(0, now + p.burstLen.value);
      g2.gain.linearRampToValueAtTime(0, now + p.burstLen.value);
      cycleTimer = setTimeout(cycle, (p.burstLen.value + p.silenceLen.value) * 1000);
    }
    return {
      analyser: c.analyser,
      start() { osc1.start(); osc2.start(); am.start(); c.fadeIn(0.5); cycle(); },
      stop() {
        clearTimeout(cycleTimer);
        c.fadeOut(0.3);
        setTimeout(() => { try { osc1.stop(); osc2.stop(); am.stop(); } catch(_) {} }, 400);
      },
      update(params) { setPitch(); c.setVolume(params.volume.value); },
    };
  },
};

PATCHES.warpDrive = {
  label: 'Warp Drive', icon: '◈', flagship: true,
  description: 'Sustained cruise tones. Detuned harmonic stack with independent drift, shimmer halo, and chaos breathing. The engine is a living thing.',
  params: {
    fundamental: { label: 'Fund',    min: 40,   max: 80,   step: 1,     value: 55,   unit: 'Hz' },
    harmonic2:   { label: 'H2',      min: 0,    max: 1,    step: 0.01,  value: 0.45 },
    harmonic3:   { label: 'H3',      min: 0,    max: 1,    step: 0.01,  value: 0.28 },
    harmonic5:   { label: 'H5',      min: 0,    max: 0.5,  step: 0.01,  value: 0.12 },
    driftRate:   { label: 'Drift',   min: 0.01, max: 0.15, step: 0.005, value: 0.037, unit: 'Hz' },
    driftDepth:  { label: 'D.Depth', min: 0,    max: 1,    step: 0.01,  value: 0.55 },
    shimmer:     { label: 'Shimmer', min: 0,    max: 0.3,  step: 0.005, value: 0.08 },
    chaos:       { label: 'Chaos',   min: 0,    max: 1,    step: 0.01,  value: 0.45 },
    warmth:      { label: 'Warmth',  min: 300,  max: 3000, step: 10,    value: 1200, unit: 'Hz' },
    volume:      { label: 'Volume',  min: 0,    max: 1,    step: 0.01,  value: 0.55 },
  },
  factory(p) {
    const c = createPatchChain(p);
    const warmth = audioCtx.createBiquadFilter();
    warmth.type = 'lowpass';
    warmth.frequency.value = p.warmth.value;
    warmth.Q.value = 0.7;
    warmth.connect(c.bus);

    const F = p.fundamental.value;

    // Fundamental — anchor
    const fund = audioCtx.createOscillator(); fund.type = 'sine';
    fund.frequency.value = F;
    const fundG = audioCtx.createGain(); fundG.gain.value = 0.5;
    fund.connect(fundG).connect(warmth);

    // Sub-fifth 1.5x
    const h15 = audioCtx.createOscillator(); h15.type = 'sine';
    h15.frequency.value = F * 1.5;
    const h15G = audioCtx.createGain(); h15G.gain.value = 0.12;
    h15.connect(h15G).connect(warmth);

    // H2 +4 cents, amp LFO
    const h2 = audioCtx.createOscillator(); h2.type = 'sine';
    h2.frequency.value = F * 2 * Math.pow(2, 4/1200);
    const h2G = audioCtx.createGain(); h2G.gain.value = p.harmonic2.value * 0.3;
    h2.connect(h2G).connect(warmth);
    const h2LFO = audioCtx.createOscillator();
    h2LFO.frequency.value = p.driftRate.value * 0.73;
    const h2LFOD = audioCtx.createGain();
    h2LFOD.gain.value = (p.harmonic2.value * 0.3) * p.driftDepth.value * 0.7;
    h2LFO.connect(h2LFOD).connect(h2G.gain);

    // H3 -8 cents, amp + pitch LFO
    const h3 = audioCtx.createOscillator(); h3.type = 'triangle';
    h3.frequency.value = F * 3 * Math.pow(2, -8/1200);
    const h3G = audioCtx.createGain(); h3G.gain.value = p.harmonic3.value * 0.22;
    h3.connect(h3G).connect(warmth);
    const h3LFO = audioCtx.createOscillator();
    h3LFO.frequency.value = p.driftRate.value * 1.29;
    const h3LFOD = audioCtx.createGain();
    h3LFOD.gain.value = (p.harmonic3.value * 0.22) * p.driftDepth.value * 0.8;
    h3LFO.connect(h3LFOD).connect(h3G.gain);
    const h3PitchLFO = audioCtx.createOscillator();
    h3PitchLFO.frequency.value = p.driftRate.value * 0.41;
    const h3PitchD = audioCtx.createGain();
    h3PitchD.gain.value = 2.5 * p.driftDepth.value;
    h3PitchLFO.connect(h3PitchD).connect(h3.frequency);

    // H5 +12 cents, slow
    const h5 = audioCtx.createOscillator(); h5.type = 'sine';
    h5.frequency.value = F * 5 * Math.pow(2, 12/1200);
    const h5G = audioCtx.createGain(); h5G.gain.value = p.harmonic5.value * 0.15;
    h5.connect(h5G).connect(warmth);
    const h5LFO = audioCtx.createOscillator();
    h5LFO.frequency.value = p.driftRate.value * 0.57;
    const h5LFOD = audioCtx.createGain();
    h5LFOD.gain.value = (p.harmonic5.value * 0.15) * p.driftDepth.value * 0.9;
    h5LFO.connect(h5LFOD).connect(h5G.gain);

    // Shimmer halo
    const shimNoise = audioCtx.createBufferSource();
    shimNoise.buffer = makeNoiseBuffer('pink', 3); shimNoise.loop = true;
    const shimBPF = audioCtx.createBiquadFilter();
    shimBPF.type = 'bandpass'; shimBPF.frequency.value = 4000; shimBPF.Q.value = 5;
    const shimG = audioCtx.createGain(); shimG.gain.value = p.shimmer.value;
    shimNoise.connect(shimBPF).connect(shimG).connect(warmth);
    const shimLFO = audioCtx.createOscillator();
    shimLFO.frequency.value = 0.21;
    const shimQD = audioCtx.createGain(); shimQD.gain.value = 3;
    shimLFO.connect(shimQD).connect(shimBPF.Q);

    // Chaos — 3 incommensurate LFOs summed into fade.gain
    const c1 = audioCtx.createOscillator(); c1.frequency.value = 0.037;
    const c2 = audioCtx.createOscillator(); c2.frequency.value = 0.037 * 1.37;
    const c3 = audioCtx.createOscillator(); c3.frequency.value = 0.037 * 2.11;
    const c1D = audioCtx.createGain(); c1D.gain.value = p.chaos.value * 0.04;
    const c2D = audioCtx.createGain(); c2D.gain.value = p.chaos.value * 0.03;
    const c3D = audioCtx.createGain(); c3D.gain.value = p.chaos.value * 0.025;
    c1.connect(c1D).connect(c.fade.gain);
    c2.connect(c2D).connect(c.fade.gain);
    c3.connect(c3D).connect(c.fade.gain);

    const allOscs = [fund, h15, h2, h3, h5, h2LFO, h3LFO, h3PitchLFO, h5LFO, shimLFO, c1, c2, c3];

    function setFreqs() {
      const t = audioCtx.currentTime;
      const F2 = p.fundamental.value;
      fund.frequency.linearRampToValueAtTime(F2, t + 0.5);
      h15.frequency.linearRampToValueAtTime(F2 * 1.5, t + 0.5);
      h2.frequency.linearRampToValueAtTime(F2 * 2 * Math.pow(2, 4/1200), t + 0.5);
      h3.frequency.linearRampToValueAtTime(F2 * 3 * Math.pow(2, -8/1200), t + 0.5);
      h5.frequency.linearRampToValueAtTime(F2 * 5 * Math.pow(2, 12/1200), t + 0.5);
    }

    return {
      analyser: c.analyser,
      start() {
        allOscs.forEach(o => o.start());
        shimNoise.start();
        c.fadeIn(3);
      },
      stop() {
        c.fadeOut(2);
        setTimeout(() => {
          try { allOscs.forEach(o => o.stop()); shimNoise.stop(); } catch(_) {}
        }, 2100);
      },
      update(params) {
        const t = audioCtx.currentTime;
        setFreqs();
        const nH2 = params.harmonic2.value * 0.3;
        const nH3 = params.harmonic3.value * 0.22;
        const nH5 = params.harmonic5.value * 0.15;
        h2G.gain.cancelScheduledValues(t);
        h3G.gain.cancelScheduledValues(t);
        h5G.gain.cancelScheduledValues(t);
        h2G.gain.setValueAtTime(nH2, t);
        h3G.gain.setValueAtTime(nH3, t);
        h5G.gain.setValueAtTime(nH5, t);
        h2LFOD.gain.linearRampToValueAtTime(nH2 * params.driftDepth.value * 0.7, t + 0.2);
        h3LFOD.gain.linearRampToValueAtTime(nH3 * params.driftDepth.value * 0.8, t + 0.2);
        h5LFOD.gain.linearRampToValueAtTime(nH5 * params.driftDepth.value * 0.9, t + 0.2);
        h2LFO.frequency.linearRampToValueAtTime(params.driftRate.value * 0.73, t + 0.2);
        h3LFO.frequency.linearRampToValueAtTime(params.driftRate.value * 1.29, t + 0.2);
        h3PitchLFO.frequency.linearRampToValueAtTime(params.driftRate.value * 0.41, t + 0.2);
        h5LFO.frequency.linearRampToValueAtTime(params.driftRate.value * 0.57, t + 0.2);
        h3PitchD.gain.linearRampToValueAtTime(2.5 * params.driftDepth.value, t + 0.2);
        shimG.gain.linearRampToValueAtTime(params.shimmer.value, t + 0.2);
        c1D.gain.linearRampToValueAtTime(params.chaos.value * 0.04, t + 0.2);
        c2D.gain.linearRampToValueAtTime(params.chaos.value * 0.03, t + 0.2);
        c3D.gain.linearRampToValueAtTime(params.chaos.value * 0.025, t + 0.2);
        warmth.frequency.linearRampToValueAtTime(params.warmth.value, t + 0.3);
        c.setVolume(params.volume.value);
      },
    };
  },
};

    osc0.connect(lp0); lp0.connect(g0); g0.connect(c.bus);
    osc1.connect(lp1); lp1.connect(g1); g1.connect(c.bus);
    osc2.connect(lp2); lp2.connect(g2); g2.connect(c.bus);
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0); for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(); noise.buffer = buf; noise.loop = true;
    const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = p.midFreq.value; bp.Q.value = 3;

    };
  },
};

PATCHES.warp = {
  label: 'Warp (rebuilt)', icon: '◎', flagship: true,
  description: 'Phase-drift harmonics with delay reverb. Energy below headache band (< 400 Hz). Engage=75 Hz, Transit=95 Hz.',
  params: {
    variant:    { label: 'Mode',     type: 'select', value: 'engage', options: ['engage', 'transit'],
      onchange: function(val, params, refs) {
        const f = { engage: 75, transit: 95 }[val];
        if (f === undefined) return;

        const r = refs.fundamental;
        if (r) { r.ctrl.value = f; if (r.valSpan) r.valSpan.textContent = f + 'Hz'; }
      }
    },
    fundamental:{ label: 'Fund',    min: 50,   max: 150,  step: 1,    value: 75,   unit: 'Hz' },
    harm2:      { label: 'H2',      min: 0,    max: 0.8,  step: 0.01, value: 0.2 },
    harm3:      { label: 'H3',      min: 0,    max: 0.5,  step: 0.01, value: 0.1 },
    harm4:      { label: 'H4',      min: 0,    max: 0.3,  step: 0.01, value: 0.05 },
    driftRate:  { label: 'Drift',   min: 0.01, max: 0.25, step: 0.005,value: 0.07, unit: 'Hz' },
    driftDepth: { label: 'D.Depth', min: 0,    max: 0.006,step: 0.0001,value: 0.002 },
    reverbAmt:  { label: 'Reverb',  min: 0,    max: 0.7,  step: 0.01, value: 0.35 },
    reverbTone: { label: 'Rev.tone',min: 400,  max: 3000, step: 50,   value: 1200, unit: 'Hz' },
    volume:     { label: 'Volume',  min: 0,    max: 1,    step: 0.01, value: 0.5 },
  },
  factory(p) {
    const c = createPatchChain(p);
    const f0 = p.fundamental.value;
    // dryBus feeds c.bus directly AND the delay input — avoids feedback
    const dryBus = audioCtx.createGain(); dryBus.gain.value = 1;
    dryBus.connect(c.bus);
    const harmAmps = [0.4, p.harm2.value, p.harm3.value, p.harm4.value];
    const harmNodes = [];
    [1, 2, 3, 4].forEach((ratio, idx) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = f0 * ratio;

        const f = params.fundamental.value;
        const amps = [0.4, params.harm2.value, params.harm3.value, params.harm4.value];
        harmNodes.forEach(({ osc, lfo, lfoG, g }, idx) => {
          osc.frequency.linearRampToValueAtTime(f * (idx + 1), t + 0.2);
          lfo.frequency.linearRampToValueAtTime(params.driftRate.value * (0.7 + idx * 0.3), t + 0.2);
          lfoG.gain.linearRampToValueAtTime(f * (idx + 1) * params.driftDepth.value, t + 0.2);

// ─── Rain perspective filter chain reference (Phase 3 porting notes) ─────────
// When a single CC0 rain recording replaces the current multi-file setup:
//
//   openair:   { lp: 6000, hp: 200, resonance: null, vol: 1.0 } — standing in it
//   ondeck:    { lp: 3000, hp: 150, resonance: 200,  vol: 0.9 } — hull exterior, peaking +4dB@200Hz
//   belowdeck: { lp: 1500, hp: 80,  resonance: 180,  vol: 0.85 } — inside hull
//   distant:   { lp: 800,  hp: 60,  resonance: null, vol: 0.7 } — 0.05Hz LFO on gain ±15%
//
// Implementation: one AudioBufferSourceNode, four BiquadFilter chains
// switched via pill selection. Optional PeakFilter for metallic resonance.

// ============================================================================
// UI
// ============================================================================
const STORAGE_KEY = 'drift_sound_lab_v3_state';
const PRESETS_KEY = 'drift_sound_lab_v3_presets';
const activeNodes = {};
const meterData = {};
const grid = document.getElementById('grid');

function deepCloneParams(params) {
  const out = {};
  for (const k in params) out[k] = Object.assign({}, params[k]);
  return out;
}

function formatVal(v, unit) {
  let num = v;
  if (typeof v === 'number') {
    if (Math.abs(v) < 1) num = v.toFixed(3);
    else if (Math.abs(v) < 10) num = v.toFixed(2);
    else num = Math.round(v);
  }
  return unit ? num + unit : num;
}

function buildCard(id, patch) {
  const card = document.createElement('div');
  card.className = 'card' + (patch.flagship ? ' flagship' : '');
  card.id = 'card-' + id;
  const params = deepCloneParams(patch.params);
  card._params = params;
  card._paramRefs = {};

  const head = document.createElement('div');
  head.className = 'card-head';
  let badges = patch.flagship
    ? '<span class="badge flag">FLAGSHIP</span>'
    : '<span class="badge syn">SYN</span>';
  if (patch.requiresHeadphones) badges += '<span class="badge hp">HP</span>';
  head.innerHTML =
    '<div class="icon">' + patch.icon + '</div>' +
    '<div class="name">' + patch.label + ' ' + badges + '</div>' +
    '<button class="play-btn" data-id="' + id + '" aria-label="Play">▶</button>' +
    '<button class="action-btn small" style="margin-left:8px;" data-export-id="' + id + '" aria-label="Export synth">Export</button>';
  card.appendChild(head);

  if (patch.requiresHeadphones) {
    const warn = document.createElement('div');
    warn.className = 'warning-banner';
    warn.textContent = '⚠ USE HEADPHONES — BINAURAL EFFECT REQUIRES STEREO SEPARATION';
    card.appendChild(warn);
  }

  const desc = document.createElement('div');
  desc.className = 'desc';
  desc.textContent = patch.description;
  card.appendChild(desc);

  const meterWrap = document.createElement('div');
  meterWrap.className = 'meter-wrap';
  const meterLabel = document.createElement('span');
  meterLabel.className = 'meter-label';
  meterLabel.textContent = 'SIG';
  const canvas = document.createElement('canvas');
  canvas.className = 'meter';
  canvas.width = 300; canvas.height = 10;
  card._meterCanvas = canvas;
  meterWrap.appendChild(meterLabel);
  meterWrap.appendChild(canvas);
  card.appendChild(meterWrap);

  for (const key in params) {
    const p = params[key];
    const row = document.createElement('div');
    row.className = 'param';
    const labelEl = document.createElement('span');
    labelEl.className = 'param-label';
    labelEl.textContent = p.label;
    row.appendChild(labelEl);

    if (p.type === 'select') {
      const sel = document.createElement('select');
      p.options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        if (opt === p.value) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', () => {
        p.value = sel.value;
        if (p.onchange) p.onchange(sel.value, params, card._paramRefs);
        saveState();
        if (activeNodes[id]) { togglePlay(id); setTimeout(() => togglePlay(id), 50); }
      });
      row.appendChild(sel);
      row.appendChild(document.createElement('span'));
      card._paramRefs[key] = { ctrl: sel };
    } else {
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = p.min; slider.max = p.max; slider.step = p.step;
      slider.value = p.value;
      const valSpan = document.createElement('span');
      valSpan.className = 'param-value';
      valSpan.textContent = formatVal(p.value, p.unit);
      slider.addEventListener('input', () => {
        p.value = parseFloat(slider.value);
        valSpan.textContent = formatVal(p.value, p.unit);
        if (activeNodes[id]) activeNodes[id].instance.update(params);
        saveState();
      });
      row.appendChild(slider);
      row.appendChild(valSpan);
      card._paramRefs[key] = { ctrl: slider, valSpan: valSpan };
    }
    card.appendChild(row);
  }

  grid.appendChild(card);
  head.querySelector('.play-btn').addEventListener('click', () => togglePlay(id));
  const expBtn = head.querySelector('[data-export-id]');
  if (expBtn) expBtn.addEventListener('click', () => exportCardAsAppSynth(id));
}

function togglePlay(id) {
  ensureRunning();
  const card = document.getElementById('card-' + id);
  const btn = card.querySelector('.play-btn');
  if (activeNodes[id]) {
    activeNodes[id].instance.stop();
    delete activeNodes[id];
    delete meterData[id];
    card.classList.remove('active');
    btn.textContent = '▶';
  } else {
    const inst = PATCHES[id].factory(card._params);
    inst.start();
    activeNodes[id] = { instance: inst };
    meterData[id] = {
      analyser: inst.analyser,
      buffer: new Uint8Array(inst.analyser.frequencyBinCount),
      peak: 0,
      peakHold: 0,
    };
    card.classList.add('active');
    btn.textContent = '■';
  }
  updateStatus();
}

function updateStatus() {
  const n = Object.keys(activeNodes).length;
  document.getElementById('status').textContent = n === 0 ? 'READY' : n + ' LAYER' + (n > 1 ? 'S' : '') + ' ACTIVE';
}

// Meters
function drawMeters() {
  for (const id in meterData) {
    const md = meterData[id];
    const card = document.getElementById('card-' + id);
    if (!card || !card._meterCanvas) continue;
    md.analyser.getByteTimeDomainData(md.buffer);
    let sum = 0;
    for (let i = 0; i < md.buffer.length; i++) {
      const v = (md.buffer[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / md.buffer.length);
    const level = Math.min(1, rms * 3);
    md.peak = Math.max(level, md.peak * 0.94);
    if (level > md.peakHold) md.peakHold = level;
    else md.peakHold = Math.max(md.peakHold - 0.005, level);
    const ctx = card._meterCanvas.getContext('2d');
    const w = card._meterCanvas.width;
    const h = card._meterCanvas.height;
    ctx.clearRect(0, 0, w, h);
    const flagship = PATCHES[id].flagship;
    ctx.fillStyle = flagship ? '#d4a056' : '#5dd06b';
    ctx.fillRect(0, 0, w * md.peak, h);
    ctx.fillStyle = flagship ? '#ffcb6b' : '#9fe5a6';
    ctx.fillRect(Math.min(w - 2, w * md.peakHold), 0, 2, h);
  }
  for (const id in PATCHES) {
    if (meterData[id]) continue;
    const card = document.getElementById('card-' + id);
    if (!card || !card._meterCanvas) continue;
    const ctx = card._meterCanvas.getContext('2d');
    ctx.clearRect(0, 0, card._meterCanvas.width, card._meterCanvas.height);
  }
  requestAnimationFrame(drawMeters);
}

// Persistence
function captureState() {
  const state = { _outputMode: _outputMode };
  for (const id in PATCHES) {
    const card = document.getElementById('card-' + id);
    if (!card) continue;
    state[id] = {};
    for (const k in card._params) state[id][k] = card._params[k].value;
  }
  return state;
}

function applyState(state) {
  if (state._outputMode) setOutputMode(state._outputMode);
  for (const id in state) {
    if (id.startsWith('_')) continue;
    const card = document.getElementById('card-' + id);
    if (!card) continue;
    const params = card._params;
    for (const k in state[id]) {
      if (params[k]) {
        params[k].value = state[id][k];
        const ref = card._paramRefs[k];
        if (ref) {
          ref.ctrl.value = params[k].value;
          if (ref.valSpan) ref.valSpan.textContent = formatVal(params[k].value, params[k].unit);
        }
      }
    }
    if (activeNodes[id]) activeNodes[id].instance.update(params);
  }
}

let saveTimer = null;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(captureState())); } catch(_) {}
  }, 300);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) applyState(JSON.parse(raw));
  } catch(_) {}
}

// Presets
function getPresets() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}'); }
  catch(_) { return {}; }
}
function savePresets(obj) {
  try { localStorage.setItem(PRESETS_KEY, JSON.stringify(obj)); } catch(_) {}
}
function refreshPresetList() {
  const sel = document.getElementById('preset-select');
  const presets = getPresets();
  const keys = Object.keys(presets).sort();
  sel.innerHTML = '';
  if (keys.length === 0) {
    const o = document.createElement('option');
    o.value = ''; o.textContent = '— no presets —'; o.disabled = true; o.selected = true;
    sel.appendChild(o);
  } else {
    keys.forEach(k => {
      const o = document.createElement('option');
      o.value = k; o.textContent = k;
      sel.appendChild(o);
    });
  }
}

// Boot
for (const id in PATCHES) buildCard(id, PATCHES[id]);
loadState();
refreshPresetList();
drawMeters();

// Footer handlers
const masterSlider = document.getElementById('master');
const masterVal = document.getElementById('master-val');
masterSlider.addEventListener('input', () => {
  const v = parseFloat(masterSlider.value);
  masterVal.textContent = v;
  masterGain.gain.linearRampToValueAtTime(v / 100, audioCtx.currentTime + 0.05);
});

document.getElementById('stop-all').addEventListener('click', () => {

});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset all parameters to defaults? Current tweaks will be lost (saved presets are safe).')) return;
  const defaults = {};
  for (const id in PATCHES) {
    defaults[id] = {};
    for (const k in PATCHES[id].params) defaults[id][k] = PATCHES[id].params[k].value;
  }
  applyState(defaults);
  saveState();
});

document.getElementById('export-btn').addEventListener('click', () => {
  document.getElementById('export-text').value = JSON.stringify(captureState(), null, 2);
  document.getElementById('export-dialog').showModal();
});

// Export as a JS snippet suitable for pasting into www/app.js
function formatAsAppJS(state) {
  // Produce a small JS file snippet: const SOUND_LAB_PRESET = { ... };
  try {
    const header = '// Paste this snippet into www/app.js\n// Example: place under a clearly marked SOUND_LAB_PRESET or synth defaults section\n';
    const body = 'const SOUND_LAB_PRESET = ' + JSON.stringify(state, null, 2) + ';\n';
    return header + '\n' + body + '\n// End of snippet\n';
  } catch (e) {
    return '// Error formatting snippet: ' + e.message;
  }
}

document.getElementById('export-appjs-btn').addEventListener('click', () => {
  const state = captureState();
  document.getElementById('export-text').value = formatAsAppJS(state);
  document.getElementById('export-dialog').showModal();
});
document.getElementById('copy-btn').addEventListener('click', async () => {
  const text = document.getElementById('export-text').value;
  try {
    await navigator.clipboard.writeText(text);
    document.getElementById('copy-btn').textContent = 'Copied';
    setTimeout(() => { document.getElementById('copy-btn').textContent = 'Copy'; }, 1500);
  } catch(_) {
    document.getElementById('export-text').select();
    document.execCommand('copy');
  }
});

let _downloadFilename = 'drift-soundlab-preset.js';

document.getElementById('download-btn').addEventListener('click', () => {
  const text = document.getElementById('export-text').value;
  const blob = new Blob([text], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = _downloadFilename || 'drift-soundlab-preset.js';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

function sanitizeId(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 32);
}

function exportCardAsAppSynth(id) {
  const patch = PATCHES[id];
  if (!patch) return alert('Patch not found: ' + id);
  const params = {};
  for (const k in patch.params) params[k] = patch.params[k].value;
  const suggestedId = sanitizeId(patch.label);
  const soundId = suggestedId;
  // Heuristic builder selection
  const hasBaseFreq = ['baseFreq','fundamental','carrierFreq','basePitch'].some(x=>x in patch.params);
  const hasFilter = ['brightness','centerFreq','warmth'].some(x=>x in patch.params);

  let builderBody = '';
  if (hasBaseFreq) {
    // Drone builder: fundamental + two harmonics
    const fundParam = Object.keys(patch.params).find(k => ['fundamental','baseFreq','carrierFreq','basePitch'].includes(k)) || Object.keys(patch.params)[0];
    const fundVal = params[fundParam] || 60;
    const volParam = Object.keys(patch.params).find(k=>k==='volume') || 'volume';
    const volVal = params[volParam] ?? 0.5;
    builderBody = `// Simple drone using three oscillators based on exported params\n  const fund = ctx.createOscillator(); fund.type='sine'; fund.frequency.value = ${fundVal};\n  const h2 = ctx.createOscillator(); h2.type='sine'; h2.frequency.value = ${fundVal} * 2;\n  const h3 = ctx.createOscillator(); h3.type='triangle'; h3.frequency.value = ${fundVal} * 3;\n  const g = ctx.createGain(); g.gain.value = ${volVal};\n  fund.connect(g); h2.connect(g); h3.connect(g); g.connect(out);\n  fund.start(); h2.start(); h3.start();\n  return { n:[fund,h2,h3,g], stop: ()=>{ try{ fund.stop(); h2.stop(); h3.stop(); }catch(_){} [fund,h2,h3,g].forEach(n=>{try{n.disconnect();}catch{}}); } };`;
  } else if (hasFilter) {
    // Filtered noise builder
    const freqParam = Object.keys(patch.params).find(k=>['brightness','centerFreq','warmth'].includes(k)) || Object.keys(patch.params)[0];
    const freqVal = params[freqParam] || 1000;
    const volVal = params.volume ?? 0.5;
    builderBody = `// Filtered noise using exported params\n  const src = ctx.createBufferSource();\n  const buf = (function(){ const b = ctx.createBuffer(1, ctx.sampleRate*2, ctx.sampleRate); const d = b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; return b; })();\n  src.buffer = buf; src.loop = true;\n  const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value = ${freqVal};\n  const g = ctx.createGain(); g.gain.value = ${volVal};\n  src.connect(f).connect(g).connect(out); src.start();\n  return { n:[src,f,g], stop: ()=>{ try{ src.stop(); }catch(_){} [src,f,g].forEach(n=>{try{n.disconnect();}catch{}}); } };`;
  } else {
    // Fallback: white noise
    const volVal = params.volume ?? 0.4;
    builderBody = `// White noise starter builder\n  const src = ctx.createBufferSource();\n  const b = ctx.createBuffer(1, ctx.sampleRate*2, ctx.sampleRate); const d = b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; src.buffer = b; src.loop = true;\n  const g = ctx.createGain(); g.gain.value = ${volVal}; src.connect(g).connect(out); src.start();\n  return { n:[src,g], stop: ()=>{ try{ src.stop(); }catch(_){} [src,g].forEach(n=>{try{n.disconnect();}catch{}}); } };`;
  }

  const descriptor = `// Add this descriptor to an existing category in app.js (e.g., CATEGORIES[0].sounds.push(...))\nconst NEW_SOUND_DESC = { id: '${soundId}', label: '${patch.label.replace(/'/g, "\\'")}', desc: '${(patch.description||'Generated from Sound Lab').replace(/'/g, "\\'")}', real: false, segs: 0 };\n`;

  const builder = `// SYNTH builder for '${soundId}' — paste into app.js as part of SYNTH_BUILDERS
SYNTH_BUILDERS = SYNTH_BUILDERS || {};
SYNTH_BUILDERS['${soundId}'] = function(ctx,out){\n  ${builderBody}\n};\n`;

  const note = `// Generated by Drift Sound Lab — review and adapt as needed.\n// Suggested id: ${soundId}\n`;

  const snippet = note + '\n' + descriptor + '\n' + builder + "\n// Usage:\n// 1) Add NEW_SOUND_DESC to a category in CATEGORIES (in app.js).\n// 2) Ensure SYNTH_BUILDERS['" + soundId + "'] is available before activateSynth('" + soundId + "') is called.\n";

  document.getElementById('export-text').value = snippet;
  _downloadFilename = 'drift-soundlab-synth-' + soundId + '.js';
  document.getElementById('export-dialog').showModal();
}


document.getElementById('import-btn').addEventListener('click', () => {

});
document.getElementById('apply-import').addEventListener('click', () => {

document.getElementById('preset-save').addEventListener('click', () => {
  document.getElementById('preset-name').value = '';
  document.getElementById('save-preset-dialog').showModal();
  setTimeout(() => document.getElementById('preset-name').focus(), 50);
});
document.getElementById('preset-save-confirm').addEventListener('click', () => {
  const name = document.getElementById('preset-name').value.trim();

  presets[name] = captureState();
  savePresets(presets);

});
document.getElementById('preset-load').addEventListener('click', () => {
  const name = document.getElementById('preset-select').value;
  if (!name) return;
  const presets = getPresets();
  if (presets[name]) { applyState(presets[name]); saveState(); }
});
document.getElementById('preset-del').addEventListener('click', () => {
  const name = document.getElementById('preset-select').value;
  if (!name) return;
  if (!confirm('Delete preset "' + name + '"?')) return;
  const presets = getPresets();
  delete presets[name];
  savePresets(presets);
  refreshPresetList();
});
document.getElementById('preset-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('preset-save-confirm').click(); }
});
